<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extended Whānau</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    canvas { display: block; cursor: auto; }

    /* --- Sidecar control panel ------------------------------------------- */
    #panel {
      position: fixed;
      top: 0; right: 0;
      width: 300px;
      height: 100vh;
      box-sizing: border-box;
      padding: 52px 16px 28px;
      overflow-y: auto;
      background: rgba(10, 11, 14, 0.82);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      color: #d8dde3;
      font: 12px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      z-index: 10;
      transition: transform 0.28s ease;
    }
    #panel.hidden { transform: translateX(100%); }
    #panel::-webkit-scrollbar { width: 8px; }
    #panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 4px; }

    #panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #panel-head h1 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff;
    }

    .group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 16px 0 8px;
    }
    .group-head:first-of-type { margin-top: 4px; }
    .group {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7fa8c9;
    }
    .group-head.off .group { color: #5a6470; }

    /* On/Off switch for each category */
    .switch {
      position: relative;
      width: 30px; height: 16px;
      flex: none;
      cursor: pointer;
    }
    .switch input { position: absolute; opacity: 0; width: 0; height: 0; }
    .switch .track {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.14);
      border-radius: 8px;
      transition: background 0.2s ease;
    }
    .switch .thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #c7ccd2;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .switch input:checked + .track { background: rgba(78,163,255,0.5); }
    .switch input:checked + .track + .thumb { background: #4ea3ff; transform: translateX(14px); }

    .ctrl { margin-bottom: 11px; }
    .ctrl-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .ctrl-label { color: #c7ccd2; }
    input.ctrl-val {
      width: 70px;
      text-align: right;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      color: #8fd0ff;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      padding: 1px 5px;
      box-sizing: border-box;
    }
    input.ctrl-val:focus {
      outline: none;
      border-color: #4ea3ff;
      background: rgba(78,163,255,0.1);
    }
    input.ctrl-val::-webkit-inner-spin-button,
    input.ctrl-val::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .ctrl input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 3px;
      background: rgba(255,255,255,0.14);
      outline: none;
      cursor: pointer;
      accent-color: #4ea3ff;
    }
    .ctrl input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #4ea3ff;
      border: 2px solid #0c1116;
      box-shadow: 0 0 0 1px rgba(78,163,255,0.5);
    }

    .btn {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11.5px;
      color: #d8dde3;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 6px;
      padding: 4px 9px;
      cursor: pointer;
    }
    .btn:hover { background: rgba(255,255,255,0.12); }

    #panel-actions { display: flex; gap: 6px; }

    #toggle {
      position: fixed;
      top: 12px; right: 12px;
      z-index: 30;
    }

    #tooltip {
      position: fixed;
      max-width: 220px;
      background: rgba(0,0,0,0.92);
      border: 1px solid rgba(255,255,255,0.14);
      color: #eef1f4;
      padding: 8px 10px;
      border-radius: 6px;
      font: 11.5px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      pointer-events: none;
      opacity: 0;
      transform: translateY(2px);
      transition: opacity 0.15s ease, transform 0.15s ease;
      z-index: 40;
    }
    #tooltip.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
<button id="toggle" class="btn" title="Show / hide controls">Controls</button>
<aside id="panel" class="hidden">
  <div id="panel-head">
    <h1>Particle Controls</h1>
    <div id="panel-actions">
      <button id="export" class="btn">Export</button>
      <button id="reset" class="btn">Reset</button>
    </div>
  </div>
  <div id="controls"></div>
</aside>
<div id="tooltip"></div>

<script>
  const scene = new THREE.Scene();

  const camera = new THREE.OrthographicCamera(
    -window.innerWidth / 2, window.innerWidth / 2,
    window.innerHeight / 2, -window.innerHeight / 2,
    1, 1000
  );
  camera.position.z = 500;

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  renderer.autoClearColor = false;
  document.body.appendChild(renderer.domElement);

  // Full-screen black quad drawn each frame at low opacity to gently fade the

  const fadeScene = new THREE.Scene();
  const fadeMat = new THREE.MeshBasicMaterial({
    color: 0x000000, transparent: true, opacity: 0.045,
    depthTest: false, depthWrite: false

  fadeQuad.scale.set(window.innerWidth, window.innerHeight, 1);
  fadeScene.add(fadeQuad);

  function makeParticleTexture() {
    const c = document.createElement('canvas');
    c.width = c.height = 64;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.9)');
    g.addColorStop(0.8, 'rgba(255,255,255,0.4)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 64, 64);
    return new THREE.CanvasTexture(c);
  }

  let mouseActive = false;

  renderer.domElement.addEventListener('mousemove', e => {

      -(e.clientY / window.innerHeight) * 2 + 1,
      0

  // Intrinsic art dimensions of the logo SVG. The logo is drawn to occupy ~65%
  // of the smaller window axis, so it stays fully framed in any aspect ratio.
  const LOGO_W = 572, LOGO_H = 595;
  function computeLogoScale() {
    return Math.min(
      window.innerWidth * 0.65 / LOGO_W,
      window.innerHeight * 0.65 / LOGO_H

  }

  let logoScale = 1;

          vel[xi] *= ratio;      vel[yi] *= ratio;
        }
        const HN = N * MAX_TAIL_HISTORY;
        for (let k = 0; k < HN; k++) { histX[k] *= ratio; histY[k] *= ratio; }
        logoScale = newScale;
      }
    }
  }
  window.addEventListener('resize', onResize);

  // Sampling: screen-space spacing (px between particles) -> uniform density
  const SPACING = 1;

  // All visually-tunable parameters live here so the sidebar sliders can drive
  // them live. Hot loops read params.X directly each frame.
  const params = {
    // Physics: very soft spring + very high damping = slow, gentle gliding
    SPRING: 0.0001,
    PUSH: 0.01,
    PUSH_RADIUS: 100,
    DAMPING: 0.992,
    // Hard cap on how fast any particle can travel (px/frame). Keeps the cursor
    // forces from flinging particles too fast / too chaotically.
    MAX_SPEED: 4,
    // Ambient idle drift: a tiny wander applied to EVERY particle at all times,
    // so the cloud is always very slightly displaced even without the cursor.
    // Steady-state offset ~ DRIFT / SPRING, so keep this small (few px).
    DRIFT: 0.0004,
    // Constant, very slow anti-clockwise rotation of the whole logo (radians/sec)
    ROT_SPEED: 0.02,
    // Noise-driven wander: a slow, random drift that strengthens near the cursor
    NOISE_STRENGTH: 0.09, // force magnitude of the random drift
    NOISE_SCALE: 0.02,    // spatial frequency of the flow field (higher = more varied directions)
    NOISE_SPEED: 0.00003, // how fast the flow field evolves over time
    JITTER: 0.1,          // per-particle random push for a fibrous, noisy look
    // Cursor field: domain-warped fractal noise + curl flow turn the clean
    // circular push into a billowing, smoke/fluid-like field with strong
    // variation in how densely particles are displaced.
    CURSOR_NOISE: 0.9,        // how strongly the density field distorts the push (0 = clean circle)
    CURSOR_NOISE_SCALE: 0.03, // spatial frequency of the fractal cursor field
    CURSOR_NOISE_SPEED: 0.0005, // how fast the fractal field gently animates
    CURSOR_WARP: 2.2,         // domain-warp amount: billowing, smoke-like structure (0 = plain noise)
    CURSOR_CURL: 0.4,         // curl-noise swirl strength: advects particles into fluid filaments/clumps
    // Colour: particles drift from white (at rest) toward saturated hues when moving
    COLOR_SPEED: 0.0001,  // how fast hues cycle over time
    COLOR_SCALE: 0.3,     // spatial frequency of the hue field
    HUE_BASE: 0.05,       // centre of the palette (~cyan/blue)
    HUE_RANGE: 0.15,      // how far hue can swing (1.0 = full spectrum)
    ENERGY_GAIN: 0.3,     // how readily motion turns particles colourful
    // Tails: each moving particle drags a tapered ribbon along its recent path
    TAIL_HISTORY: 12,     // number of past positions kept per particle
    TAIL_WIDTH: 1.4,      // half-width of the ribbon at the head (px)
    TAIL_ALPHA: 0.5,      // peak brightness at the head
    TAIL_MIN_SPREAD: 0,   // min head->tail distance (px) before a trail draws; 0 = every moving particle trails
    // Render
    PARTICLE_SIZE: 1.5,   // on-screen size of each particle point
    FADE_OPACITY: 0.045   // per-frame fade of previous frame (lower = longer trails)
  };

  // Fixed allocation budgets. TAIL_HISTORY is live-tunable, so buffers are sized
  // for the maximum and only the active prefix length is used each frame.
  const MAX_TAIL_HISTORY = 24;
  const MAX_TAIL_VERTS = MAX_TAIL_HISTORY * 2;        // 2 ribbon vertices per history point
  const MAX_TAIL_INDICES = (MAX_TAIL_HISTORY - 1) * 6; // 2 triangles per ribbon segment
  // Upper bound on simultaneously drawn trails. Set to the real particle count
  // once the logo is sampled (see img.onload) so every particle can carry a
  // trail; the initial value only sizes nothing until then.
  let TAIL_MAX_ACTIVE = 9000;

  let N = 0;
  let orig, origBase, pos, vel, seed;
  let colors, geo, pointsMat;
  // Running rotation state for the constant slow spin of the whole logo.
  let rotAngle = 0, lastNow = 0;
  // Path-history ring buffers (one slot per particle per history step) and the
  // compact ribbon geometry that only holds the currently active trails.
  let histX, histY, histHead = 0;
  let tailPos, tailCol, tailAlpha, tailGeo, tailIdx;
  const sampX = new Float32Array(MAX_TAIL_HISTORY);
  const sampY = new Float32Array(MAX_TAIL_HISTORY);
  const col = new THREE.Color();

  // Rebuild the tail index buffer for a given active history length. Indices for
  // each trail slot are packed contiguously (slot t uses vertex base
  // t*MAX_TAIL_VERTS) so the draw range can cover the active slots in one go.
  let tailIndexPerSlot = 0;
  function buildTailIndices(TH) {
    let ip = 0;
    for (let t = 0; t < TAIL_MAX_ACTIVE; t++) {
      const vbase = t * MAX_TAIL_VERTS;
      for (let j = 0; j < TH - 1; j++) {
        const a = vbase + j * 2, b = a + 1, c = a + 2, d = a + 3;
        tailIdx[ip++] = a; tailIdx[ip++] = b; tailIdx[ip++] = c;
        tailIdx[ip++] = b; tailIdx[ip++] = d; tailIdx[ip++] = c;
      }
    }
    tailIndexPerSlot = (TH - 1) * 6;
    if (tailGeo) tailGeo.index.needsUpdate = true;
  }

  const img = new Image();
  img.onload = () => {
    const W = LOGO_W, H = LOGO_H;

    // Render the SVG at its on-screen size so sampling density is uniform.
    // Record the scale so a later resize can rescale the field proportionally.
    logoScale = computeLogoScale();
    const dw = Math.round(W * logoScale);
    const dh = Math.round(H * logoScale);

    const offscreen = document.createElement('canvas');
    offscreen.width = dw;
    offscreen.height = dh;
    const ctx = offscreen.getContext('2d');
    ctx.drawImage(img, 0, 0, dw, dh);
    const px = ctx.getImageData(0, 0, dw, dh).data;

    const pts = [];
    for (let y = 0; y < dh; y += SPACING) {
      for (let x = 0; x < dw; x += SPACING) {
        if (px[(y * dw + x) * 4 + 3] > 128) {
          pts.push(x - dw / 2, -(y - dh / 2), 0);
        }
      }
    }

    N = pts.length / 3;
    // Size the trail buffers for the full particle count so a trail can be
    // drawn for every particle when Trails are on (no particles dropped).
    TAIL_MAX_ACTIVE = N;
    orig = new Float32Array(pts);
    // Immutable copy of the un-rotated rest positions; `orig` is recomputed each
    // frame as a rotation of this so floating-point error never accumulates.
    origBase = new Float32Array(pts);
    pos = new Float32Array(pts);
    vel = new Float32Array(N * 3);
    // Per-particle random seeds: decorrelate neighbours so the drift looks fibrous
    seed = new Float32Array(N);
    for (let i = 0; i < N; i++) seed[i] = Math.random() * 1000;
    // Per-particle colour buffer, starts white
    colors = new Float32Array(N * 3).fill(1);

    const tex = makeParticleTexture();
    geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    pointsMat = new THREE.PointsMaterial({
      size: params.PARTICLE_SIZE,
      map: tex,
      vertexColors: true,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: false
    });
    // Per-particle path history, primed to the rest position so trails start
    // collapsed (invisible) until a particle actually moves.
    histX = new Float32Array(N * MAX_TAIL_HISTORY);
    histY = new Float32Array(N * MAX_TAIL_HISTORY);
    for (let i = 0; i < N; i++) {
      const hx = orig[i * 3], hy = orig[i * 3 + 1];
      const base = i * MAX_TAIL_HISTORY;
      for (let j = 0; j < MAX_TAIL_HISTORY; j++) {
        histX[base + j] = hx;
        histY[base + j] = hy;
      }
    }

    // Tapered tails rendered as ribbons that follow each particle's recent path.
    // The ribbon has 2 vertices per history point (left/right of the centre
    // line); width and alpha taper from the head down to nothing at the tail.
    // The geometry is sized for at most TAIL_MAX_ACTIVE trails and only the
    // active prefix is uploaded/drawn each frame, so idle particles cost nothing
    // on the GPU. A tiny shader lets every vertex carry its own alpha.
    tailPos = new Float32Array(TAIL_MAX_ACTIVE * MAX_TAIL_VERTS * 3);
    tailCol = new Float32Array(TAIL_MAX_ACTIVE * MAX_TAIL_VERTS * 3);
    tailAlpha = new Float32Array(TAIL_MAX_ACTIVE * MAX_TAIL_VERTS);
    tailIdx = new Uint32Array(TAIL_MAX_ACTIVE * MAX_TAIL_INDICES);
    buildTailIndices(params.TAIL_HISTORY);
    tailGeo = new THREE.BufferGeometry();
    tailGeo.setAttribute('position', new THREE.BufferAttribute(tailPos, 3));
    tailGeo.setAttribute('color', new THREE.BufferAttribute(tailCol, 3));
    tailGeo.setAttribute('alpha', new THREE.BufferAttribute(tailAlpha, 1));
    tailGeo.setIndex(new THREE.BufferAttribute(tailIdx, 1));
    tailGeo.setDrawRange(0, 0);
    const tailMat = new THREE.ShaderMaterial({
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthTest: false,
      depthWrite: false,
      side: THREE.DoubleSide,
      vertexShader: `
        attribute vec3 color;
        attribute float alpha;
        varying vec3 vColor;
        varying float vAlpha;
        void main() {
          vColor = color;
          vAlpha = alpha;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        precision mediump float;
        varying vec3 vColor;
        varying float vAlpha;
        void main() {
          gl_FragColor = vec4(vColor, vAlpha);
        }
      `
    });
    scene.add(new THREE.Mesh(tailGeo, tailMat));

    scene.add(new THREE.Points(geo, pointsMat));

    buildUI();
    animate();
  };
  // Build a data URI from the inline SVG so the canvas is never tainted
  // (works when opened directly via file:// as well as over http://)
  const svgEl = document.getElementById('logo-svg');
  const svgData = new XMLSerializer().serializeToString(svgEl);
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgData);

  // Cheap smooth value noise (0..1) used to build a wandering flow field
  function valueNoise(x, y) {
    const xi = Math.floor(x), yi = Math.floor(y);
    const xf = x - xi, yf = y - yi;
    const u = xf * xf * (3 - 2 * xf);
    const v = yf * yf * (3 - 2 * yf);
    const h = (X, Y) => {
      let n = (X * 374761393 + Y * 668265263) | 0;
      n = (n ^ (n >> 13)) * 1274126177 | 0;
      return ((n ^ (n >> 16)) & 0xffff) / 0xffff;
    };
    const a = h(xi, yi), b = h(xi + 1, yi);
    const c = h(xi, yi + 1), d = h(xi + 1, yi + 1);
    return (a * (1 - u) + b * u) * (1 - v) + (c * (1 - u) + d * u) * v;
  }

  // Fractal Brownian motion: stacked octaves of value noise -> a richer, more
  // organic field (~0..1). Used to break up the circular cursor influence so it
  // reads as an irregular, churning shape rather than a smooth sphere.
  function fbm(x, y) {
    let v = 0, amp = 0.5, freq = 1;
    for (let o = 0; o < 4; o++) {
      v += amp * valueNoise(x * freq, y * freq);
      freq *= 2;
      amp *= 0.5;
    }
    return v; // peak sum of amplitudes = 0.9375
  }

  // Domain-warped fbm (iq-style): the sample point is displaced by two further
  // fbm look-ups before the final sample, producing billowing, smoke/cloud-like
  // structure rather than blobby noise. `w` is the warp amount, `tw` a slow time
  // offset injected into the warp layer so the structure churns instead of
  // merely sliding past.
  function warpedFbm(x, y, w, tw) {
    if (w <= 0) return fbm(x, y);
    const qx = fbm(x, y);
    const qy = fbm(x + 5.2, y + 1.3);
    const rx = fbm(x + w * qx + 1.7 + tw, y + w * qy + 9.2);
    const ry = fbm(x + w * qx + 8.3, y + w * qy + 2.8 - tw);
    return fbm(x + w * rx, y + w * ry);
  }

  function animate() {
    requestAnimationFrame(animate);

    const r = params.PUSH_RADIUS * Math.min(window.innerWidth, window.innerHeight) / 900;
    const rSq = r * r;
    const now = performance.now();
    const t = now * params.NOISE_SPEED;
    const tc = now * params.COLOR_SPEED;
    const tCur = now * params.CURSOR_NOISE_SPEED;
    const TH = params.TAIL_HISTORY;

    // Per-category enable flags (see the On/Off switches in the panel headers).
    const motionOn = groupOn['Motion'];
    const rotOn = groupOn['Rotation'];
    const noiseOn = groupOn['Noise & jitter'];
    const cursorOn = groupOn['Cursor field'];
    const colorOn = groupOn['Colour'];
    const tailsOn = groupOn['Trails'];

    // Constant slow anti-clockwise spin of the whole logo. `orig` is recomputed
    // as an absolute rotation of origBase (drift-free); pos/vel are rotated by
    // this frame's small delta so the cloud spins rigidly as one body.
    const dt = lastNow ? (now - lastNow) / 1000 : 0;
    lastNow = now;
    const rotSpeed = rotOn ? params.ROT_SPEED : 0;
    rotAngle += rotSpeed * dt;
    const cosA = Math.cos(rotAngle), sinA = Math.sin(rotAngle);
    const dAng = rotSpeed * dt;
    const cosD = Math.cos(dAng), sinD = Math.sin(dAng);

    // Advance the shared ring-buffer head; each particle writes its new
    // position into this slot below. The oldest sample is one step ahead.
    histHead = (histHead + 1) % TH;
    const oldHead = (histHead + 1) % TH;
    let activeCount = 0;

    for (let i = 0; i < N; i++) {
      const xi = i * 3, yi = xi + 1;

      // Spin the whole body: rotate the rest target absolutely, and the live
      // position/velocity by this frame's delta, so dynamics are preserved.
      const bx = origBase[xi], by = origBase[yi];
      orig[xi] = bx * cosA - by * sinA;
      orig[yi] = bx * sinA + by * cosA;
      const px0 = pos[xi], py0 = pos[yi];
      pos[xi] = px0 * cosD - py0 * sinD;
      pos[yi] = px0 * sinD + py0 * cosD;
      const vx0 = vel[xi], vy0 = vel[yi];
      vel[xi] = vx0 * cosD - vy0 * sinD;
      vel[yi] = vx0 * sinD + vy0 * cosD;

      vel[xi] += (orig[xi] - pos[xi]) * params.SPRING;
      vel[yi] += (orig[yi] - pos[yi]) * params.SPRING;

      // Flow-field direction for this particle; the per-particle seed offsets
      // each sample so neighbours decorrelate into a fibrous texture.
      const s = seed[i];
      const angle = valueNoise(pos[xi] * params.NOISE_SCALE + t + s, pos[yi] * params.NOISE_SCALE - t + s) * Math.PI * 6;
      const ca = Math.cos(angle), sa = Math.sin(angle);

      // Ambient idle drift — a very gentle wander applied to every particle at
      // all times, so the cloud is always slightly displaced even at rest.
      if (motionOn) {
        vel[xi] += ca * params.DRIFT;
        vel[yi] += sa * params.DRIFT;
      }

      if (mouseActive) {
        const dx = pos[xi] - mousePos.x;
        const dy = pos[yi] - mousePos.y;
        const dSq = dx * dx + dy * dy;
        if (dSq < rSq && dSq > 0.01) {
          const d = Math.sqrt(dSq);
          // Sample point in the cursor's local frame, slowly drifting over time.
          const wfx = dx * params.CURSOR_NOISE_SCALE + tCur;
          const wfy = dy * params.CURSOR_NOISE_SCALE - tCur;

          // Domain-warped fractal "density" field: billowing, smoke-like value
          // with dense cores, wispy edges and outright holes (falloff <= 0).
          // When the Cursor field category is off, the push stays a clean circle.
          let mod = 1;
          if (cursorOn) {
            const dens = warpedFbm(wfx, wfy, params.CURSOR_WARP, tCur);
            mod = 1 + (dens - 0.45) * 2.4 * params.CURSOR_NOISE;
          }
          let falloff = (1 - d / r) * mod;
          if (falloff > 0) {
            if (falloff > 1.6) falloff = 1.6;
            // Radial push opens the logo up near the cursor.
            if (motionOn) {
              const f = falloff * falloff * params.PUSH;
              vel[xi] += (dx / d) * f;
              vel[yi] += (dy / d) * f;
            }

            // Curl of a fractal potential -> a divergence-free swirl that drags
            // particles along fluid filaments, piling them up at stagnation
            // points and thinning them elsewhere (smoke-like density variation).
            if (cursorOn) {
              const eps = 0.35;
              const gx = fbm(wfx + eps, wfy) - fbm(wfx - eps, wfy);
              const gy = fbm(wfx, wfy + eps) - fbm(wfx, wfy - eps);
              const cf = falloff * params.CURSOR_CURL;
              vel[xi] += gy * cf;   // (+dP/dy, -dP/dx) = curl of potential P
              vel[yi] += -gx * cf;
            }

            if (noiseOn) {
              // The flow-field wander adds finer turbulence on top.
              const nf = falloff * params.NOISE_STRENGTH;
              vel[xi] += ca * nf;
              vel[yi] += sa * nf;

              // Extra per-particle jitter for a finer, more random fibrous texture
              const jf = falloff * params.JITTER;
              vel[xi] += (Math.random() - 0.5) * jf;
              vel[yi] += (Math.random() - 0.5) * jf;
            }
          }
        }
      }

      vel[xi] *= params.DAMPING;
      vel[yi] *= params.DAMPING;

      // Clamp speed so cursor forces can't fling particles too fast -> calmer,
      // less chaotic motion without killing the gentle idle drift.
      const maxS = params.MAX_SPEED;
      const sp2 = vel[xi] * vel[xi] + vel[yi] * vel[yi];
      if (sp2 > maxS * maxS) {
        const sc = maxS / Math.sqrt(sp2);
        vel[xi] *= sc;
        vel[yi] *= sc;
      }

      pos[xi] += vel[xi];
      pos[yi] += vel[yi];

      // Colour: white at rest, shifting to saturated hues as a particle moves.
      // Energy comes from both current speed and distance from home. When the
      // Colour category is off, particles (and their tails) stay white.
      if (colorOn) {
        const ox = pos[xi] - orig[xi];
        const oy = pos[yi] - orig[yi];
        const speed = Math.abs(vel[xi]) + Math.abs(vel[yi]);
        const disp = Math.abs(ox) + Math.abs(oy);
        let energy = (speed * 1.5 + disp * 0.03) * params.ENERGY_GAIN;
        if (energy > 1) energy = 1;

        const hue = params.HUE_BASE + (valueNoise(orig[xi] * params.COLOR_SCALE + tc + seed[i],
                                           orig[yi] * params.COLOR_SCALE - tc) - 0.5) * params.HUE_RANGE;
        col.setHSL(((hue % 1) + 1) % 1, energy, 1 - 0.45 * energy);
      } else {
        col.setRGB(1, 1, 1);
      }
      colors[xi] = col.r;
      colors[yi] = col.g;
      colors[xi + 2] = col.b;

      // Record the new position into this particle's path history.
      const hbase = i * MAX_TAIL_HISTORY;
      histX[hbase + histHead] = pos[xi];
      histY[hbase + histHead] = pos[yi];

      // Only build a ribbon when the path has meaningfully spread out (i.e. the
      // particle has actually travelled). Idle particles are skipped entirely.
      if (tailsOn && activeCount < TAIL_MAX_ACTIVE) {
        let sdx = pos[xi] - histX[hbase + oldHead];
        let sdy = pos[yi] - histY[hbase + oldHead];
        if (sdx * sdx + sdy * sdy > params.TAIL_MIN_SPREAD * params.TAIL_MIN_SPREAD) {
          // Gather this particle's path, newest first, into scratch buffers.
          for (let j = 0; j < TH; j++) {
            const ring = (histHead - j + TH) % TH;
            sampX[j] = histX[hbase + ring];
            sampY[j] = histY[hbase + ring];
          }

          const slot = activeCount++;
          let vp = slot * MAX_TAIL_VERTS * 3;
          let ap = slot * MAX_TAIL_VERTS;
          // Seed the tangent with the overall travel direction for stability.
          let lastTx = sdx, lastTy = sdy;
          for (let j = 0; j < TH; j++) {
            const jn = j > 0 ? j - 1 : 0;                       // newer neighbour
            const jo = j < TH - 1 ? j + 1 : TH - 1;             // older
            let tx = sampX[jn] - sampX[jo];
            let ty = sampY[jn] - sampY[jo];
            let tl = Math.sqrt(tx * tx + ty * ty);
            if (tl < 1e-3) { tx = lastTx; ty = lastTy; tl = Math.sqrt(tx * tx + ty * ty) || 1; }
            else { lastTx = tx; lastTy = ty; }
            const nx = -ty / tl, ny = tx / tl;                  // unit perpendicular
            const frac = 1 - j / (TH - 1);                      // 1 head -> 0 tail
            const w = params.TAIL_WIDTH * frac;
            const a = params.TAIL_ALPHA * frac * frac;          // alpha fades faster
            const cx = sampX[j], cy = sampY[j];
            tailPos[vp]     = cx + nx * w; tailPos[vp + 1] = cy + ny * w; tailPos[vp + 2] = 0;
            tailPos[vp + 3] = cx - nx * w; tailPos[vp + 4] = cy - ny * w; tailPos[vp + 5] = 0;
            tailCol[vp]     = col.r; tailCol[vp + 1] = col.g; tailCol[vp + 2] = col.b;
            tailCol[vp + 3] = col.r; tailCol[vp + 4] = col.g; tailCol[vp + 5] = col.b;
            tailAlpha[ap] = a; tailAlpha[ap + 1] = a;
            vp += 6; ap += 2;
          }
        }
      }
    }

    geo.attributes.position.needsUpdate = true;
    geo.attributes.color.needsUpdate = true;

    // Draw and upload only the active prefix of the ribbon buffers.
    tailGeo.setDrawRange(0, activeCount * tailIndexPerSlot);
    if (activeCount > 0) {
      const usedVerts = activeCount * MAX_TAIL_VERTS;
      tailGeo.attributes.position.updateRange.count = usedVerts * 3;
      tailGeo.attributes.color.updateRange.count = usedVerts * 3;
      tailGeo.attributes.alpha.updateRange.count = usedVerts;
      tailGeo.attributes.position.needsUpdate = true;
      tailGeo.attributes.color.needsUpdate = true;
      tailGeo.attributes.alpha.needsUpdate = true;
    }

    renderer.render(fadeScene, camera);  // fade previous frame -> trails
    renderer.render(scene, camera);      // draw particles on top
  }

  // --- Sidecar control panel --------------------------------------------------
  // Each control maps a slider to a params key. {group} entries insert a header.
  // `int` rounds the value; `desc` is shown as a hover tooltip after 1 second.
  const CONTROLS = [
    { group: 'Motion' },
    { key: 'DRIFT', label: 'Idle drift', min: 0, max: 0.01, step: 0.0001,
      desc: 'Constant gentle wander applied to every particle, even when the cursor is away. Keeps the whole cloud subtly alive (a few px of displacement).' },
    { key: 'SPRING', label: 'Spring', min: 0, max: 0.005, step: 0.0001,
      desc: 'Restoring force that pulls each particle back toward its home position. Higher snaps back faster.' },
    { key: 'PUSH', label: 'Push', min: 0, max: 0.1, step: 0.001,
      desc: 'Strength of the cursor\u2019s repulsion on nearby particles.' },
    { key: 'PUSH_RADIUS', label: 'Push radius', min: 0, max: 400, step: 1,
      desc: 'Radius around the cursor (px) within which particles are pushed.' },
    { key: 'DAMPING', label: 'Damping', min: 0.9, max: 0.999, step: 0.001,
      desc: 'Fraction of velocity kept each frame. Higher means particles glide longer before settling.' },
    { key: 'MAX_SPEED', label: 'Max speed', min: 0.5, max: 20, step: 0.1,
      desc: 'Hard cap on how fast any particle can move (px/frame). Lower it to calm chaotic, fast motion when particles are affected by the cursor.' },

    { group: 'Rotation' },
    { key: 'ROT_SPEED', label: 'Spin speed', min: 0, max: 0.3, step: 0.005,
      desc: 'Constant anti-clockwise rotation of the whole logo, in radians per second. Small values give a very slow, steady spin.' },

    { group: 'Noise & jitter' },
    { key: 'NOISE_STRENGTH', label: 'Noise strength', min: 0, max: 0.5, step: 0.005,
      desc: 'Magnitude of the flow-field drift force that strengthens near the cursor.' },
    { key: 'NOISE_SCALE', label: 'Noise scale', min: 0.001, max: 0.1, step: 0.001,
      desc: 'Spatial frequency of the flow field. Higher gives more varied, swirlier directions.' },
    { key: 'NOISE_SPEED', label: 'Noise speed', min: 0, max: 0.0002, step: 0.000001,
      desc: 'How fast the flow field evolves over time.' },
    { key: 'JITTER', label: 'Jitter', min: 0, max: 1, step: 0.01,
      desc: 'Per-particle random push for a finer, more fibrous texture.' },

    { group: 'Cursor field' },
    { key: 'CURSOR_NOISE', label: 'Density variation', min: 0, max: 1.5, step: 0.01,
      desc: 'How strongly the fractal density field distorts the cursor\u2019s influence. 0 is a clean circle; higher gives dense cores, wispy edges and holes instead of a sphere.' },
    { key: 'CURSOR_WARP', label: 'Fractal warp', min: 0, max: 4, step: 0.05,
      desc: 'Domain-warp amount. Higher folds the noise into billowing, smoke/cloud-like structures rather than plain blobs.' },
    { key: 'CURSOR_CURL', label: 'Curl flow', min: 0, max: 2, step: 0.01,
      desc: 'Strength of the divergence-free curl swirl that drags particles into fluid filaments and clumps, like smoke or ink in water.' },
    { key: 'CURSOR_NOISE_SCALE', label: 'Fractal scale', min: 0.005, max: 0.1, step: 0.001,
      desc: 'Spatial frequency of the fractal cursor field. Higher gives smaller, busier detail in the affected area.' },
    { key: 'CURSOR_NOISE_SPEED', label: 'Fractal speed', min: 0, max: 0.003, step: 0.0001,
      desc: 'How fast the fractal cursor field gently churns and animates over time.' },

    { group: 'Colour' },
    { key: 'COLOR_SPEED', label: 'Colour speed', min: 0, max: 0.001, step: 0.00001,
      desc: 'How fast hues cycle over time.' },
    { key: 'COLOR_SCALE', label: 'Colour scale', min: 0, max: 1, step: 0.01,
      desc: 'Spatial frequency of the hue field across the logo.' },
    { key: 'HUE_BASE', label: 'Hue base', min: 0, max: 1, step: 0.01,
      desc: 'Centre of the colour palette on the hue wheel (0\u20131).' },
    { key: 'HUE_RANGE', label: 'Hue range', min: 0, max: 1, step: 0.01,
      desc: 'How far the hue can swing away from the base hue.' },
    { key: 'ENERGY_GAIN', label: 'Energy gain', min: 0, max: 2, step: 0.01,
      desc: 'How readily motion turns particles from white toward saturated colour.' },

    { group: 'Trails' },
    { key: 'TAIL_HISTORY', label: 'Tail history', min: 2, max: MAX_TAIL_HISTORY, step: 1, int: true,
      desc: 'Number of past positions kept per particle \u2014 the length of each trail.' },
    { key: 'TAIL_WIDTH', label: 'Tail width', min: 0, max: 5, step: 0.1,
      desc: 'Half-width of the trail ribbon at its head (px).' },
    { key: 'TAIL_ALPHA', label: 'Tail alpha', min: 0, max: 1, step: 0.01,
      desc: 'Peak brightness at the head of each trail.' },
    { key: 'TAIL_MIN_SPREAD', label: 'Tail min spread', min: 0, max: 5, step: 0.1,
      desc: 'Minimum distance a particle must travel before a trail is drawn (px).' },

    { group: 'Render' },
    { key: 'PARTICLE_SIZE', label: 'Particle size', min: 0.5, max: 6, step: 0.1,
      desc: 'On-screen size of each particle point.' },
    { key: 'FADE_OPACITY', label: 'Trail fade', min: 0.005, max: 0.2, step: 0.005,
      desc: 'How strongly each frame fades the previous one. Lower means longer, smearier motion trails.' }
  ];

  const DEFAULTS = Object.assign({}, params);
  const inputEls = {};
  const valEls = {};

  // Per-category On/Off state. The animation loop gates each category's effect
  // on these flags so a category can be muted without losing its slider values.
  const TOGGLE_GROUPS = ['Motion', 'Rotation', 'Noise & jitter', 'Cursor field', 'Colour', 'Trails'];
  const groupOn = {};
  TOGGLE_GROUPS.forEach(g => { groupOn[g] = true; });
  groupOn['Trails'] = false; // Trails are off by default
  const groupSwitchEls = {};

  function fmt(v, step) {
    if (step >= 1) return String(Math.round(v));
    const d = Math.max(0, Math.ceil(-Math.log10(step)));
    return v.toFixed(d);
  }

  // Apply side effects for keys that change GPU state rather than being read
  // live in the animation loop each frame.
  function applySideEffects(key) {
    if (key === 'PARTICLE_SIZE' && pointsMat) pointsMat.size = params.PARTICLE_SIZE;
    if (key === 'FADE_OPACITY') fadeMat.opacity = params.FADE_OPACITY;
    if (key === 'TAIL_HISTORY' && tailIdx) buildTailIndices(params.TAIL_HISTORY);
  }

  function buildUI() {
    const host = document.getElementById('controls');
    const tip = document.getElementById('tooltip');
    let tipTimer = null;

    CONTROLS.forEach(c => {
      if (c.group) {
        const head = document.createElement('div');
        head.className = 'group-head';
        const h = document.createElement('div');
        h.className = 'group';
        h.textContent = c.group;
        head.appendChild(h);

        if (TOGGLE_GROUPS.indexOf(c.group) !== -1) {
          const sw = document.createElement('label');
          sw.className = 'switch';
          sw.title = 'Enable / disable ' + c.group;
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = groupOn[c.group];
          head.classList.toggle('off', !cb.checked);
          const track = document.createElement('span');
          track.className = 'track';
          const thumb = document.createElement('span');
          thumb.className = 'thumb';
          cb.addEventListener('change', () => {
            groupOn[c.group] = cb.checked;
            head.classList.toggle('off', !cb.checked);
          });
          sw.appendChild(cb);
          sw.appendChild(track);
          sw.appendChild(thumb);
          head.appendChild(sw);
          groupSwitchEls[c.group] = cb;
        }

        host.appendChild(head);
        return;
      }

      const row = document.createElement('div');
      row.className = 'ctrl';

      const top = document.createElement('div');
      top.className = 'ctrl-top';
      const lab = document.createElement('span');
      lab.className = 'ctrl-label';
      lab.textContent = c.label;
      // Editable number field: type an exact value, or use the slider below.
      const val = document.createElement('input');
      val.type = 'number';
      val.className = 'ctrl-val';
      val.min = c.min;
      val.max = c.max;
      val.step = c.step;
      val.value = fmt(params[c.key], c.step);
      top.appendChild(lab);
      top.appendChild(val);

      const input = document.createElement('input');
      input.type = 'range';
      input.min = c.min;
      input.max = c.max;
      input.step = c.step;
      input.value = params[c.key];

      // Slider -> params + number field
      input.addEventListener('input', () => {
        const v = c.int ? parseInt(input.value, 10) : parseFloat(input.value);
        params[c.key] = v;
        val.value = fmt(v, c.step);
        applySideEffects(c.key);
      });

      // Typed number -> params + slider (clamped to the control's range)
      const commitNumber = () => {
        let v = c.int ? parseInt(val.value, 10) : parseFloat(val.value);
        if (isNaN(v)) { val.value = fmt(params[c.key], c.step); return; }
        v = Math.min(c.max, Math.max(c.min, v));
        params[c.key] = v;
        val.value = fmt(v, c.step);
        input.value = v;
        applySideEffects(c.key);
      };
      val.addEventListener('change', commitNumber);
      val.addEventListener('keydown', e => { if (e.key === 'Enter') val.blur(); });

      row.appendChild(top);
      row.appendChild(input);
      host.appendChild(row);

      inputEls[c.key] = input;
      valEls[c.key] = val;

      // Tooltip: show the description after the cursor rests on the row for 1s.
      row.addEventListener('mouseenter', () => {
        tipTimer = setTimeout(() => {
          tip.textContent = c.desc;
          const rect = row.getBoundingClientRect();
          const panelRect = document.getElementById('panel').getBoundingClientRect();
          tip.style.right = (window.innerWidth - panelRect.left + 12) + 'px';
          tip.style.top = Math.max(8, rect.top) + 'px';
          tip.classList.add('show');
        }, 1000);
      });
      row.addEventListener('mouseleave', () => {
        clearTimeout(tipTimer);
        tip.classList.remove('show');
      });
    });

    // Sync GPU-state controls to their starting values.
    applySideEffects('FADE_OPACITY');

    document.getElementById('reset').addEventListener('click', () => {
      Object.keys(DEFAULTS).forEach(k => {
        params[k] = DEFAULTS[k];
        if (inputEls[k]) inputEls[k].value = DEFAULTS[k];
        if (valEls[k]) {
          const ctrl = CONTROLS.find(c => c.key === k);
          valEls[k].value = fmt(DEFAULTS[k], ctrl.step);
        }
        applySideEffects(k);
      });
      // Re-enable every category.
      TOGGLE_GROUPS.forEach(g => {
        groupOn[g] = true;
        const cb = groupSwitchEls[g];
        if (cb) { cb.checked = true; cb.closest('.group-head').classList.remove('off'); }
      });
    });

    document.getElementById('export').addEventListener('click', exportSettingsCSV);
  }

  // Export the current settings as a CSV so values can be reviewed in a
  // spreadsheet and copied into the final sketch. Columns:
  //   category, setting, value, enabled
  // Each parameter row carries its category's On/Off state in `enabled` so it is
  // clear which values were actually active when the snapshot was taken.
  function exportSettingsCSV() {
    const esc = v => {
      const s = String(v);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    };

    const rows = [['category', 'setting', 'value', 'enabled']];
    let currentGroup = '';
    CONTROLS.forEach(c => {
      if (c.group) { currentGroup = c.group; return; }
      const enabled = TOGGLE_GROUPS.indexOf(currentGroup) === -1
        ? '' : (groupOn[currentGroup] ? 'on' : 'off');
      rows.push([currentGroup, c.label, fmt(params[c.key], c.step), enabled]);
    });

    const csv = rows.map(r => r.map(esc).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const pad = n => String(n).padStart(2, '0');
    const d = new Date();
    const stamp = `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
    const a = document.createElement('a');
    a.href = url;
    a.download = `particle-settings-${stamp}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  document.getElementById('toggle').addEventListener('click', () => {
    document.getElementById('panel').classList.toggle('hidden');
  });
</script>
</body>
</html>
